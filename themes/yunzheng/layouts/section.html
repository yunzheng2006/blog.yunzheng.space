{{ define "main" }}
  <h1 style="font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:2px solid var(--line);text-transform:uppercase;letter-spacing:0.1em;">{{ .Title }}</h1>
  {{ .Content }}
  <ul class="post-list">
    {{ range .Pages }}
    <li class="post-item">
      <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
      <h2 class="post-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      {{ if .Summary }}<div class="post-summary">{{ .Summary }}</div>{{ end }}
    </li>
    {{ end }}
  </ul>
{{ end }}
