<!DOCTYPE html>
<html lang="{{ .Lang | default "zh" }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta name="author" content="{{ .Site.Params.author }}">
    <link rel="canonical" href="{{ .Permalink }}">
    <meta property="og:title" content="{{ .Title }}">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:site_name" content="{{ .Site.Title }}">
    <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
    <meta name="theme-color" content="#f6f5f3">
    <link rel="icon" type="image/png" href="https://yunzheng.space/yunzheng.space.png">
    <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "index.xml" | absURL }}">
    <link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
</head>
<body>
    <div class="page">
        <header class="site-header">
            <a class="logo" href="{{ .Site.BaseURL }}">
                <img src="https://yunzheng.space/yunzheng.space.png" alt="{{ .Site.Title }}">
                <span class="site-title">{{ .Site.Title }}</span>
            </a>
            <div class="site-desc">{{ .Site.Params.description }}</div>
            <nav class="site-nav">
                {{ range .Site.Menus.main }}
                <a href="{{ .URL }}"{{ if hasPrefix $.RelPermalink .URL }} class="active"{{ end }}{{ if strings.HasPrefix .URL "http" }} target="_blank" rel="noopener"{{ end }}>{{ .Name }}</a>
                {{ end }}
                <a href="{{ .Site.Params.mainSite }}" target="_blank" rel="noopener">主站</a>
            </nav>
        </header>

        <main>
            {{ block "main" . }}{{ end }}
        </main>

        <footer class="site-footer">
            <span>&copy; {{ now.Year }} {{ .Site.Params.author }}</span>
            <a href="{{ .Site.Params.mainSite }}">yunzheng.space</a>
        </footer>
    </div>
</body>
</html>
