baseURL = 'https://blog.yunzheng.space/'
locale = 'zh-CN'
defaultContentLanguage = 'zh'
title = '芸峥のBlog'
theme = 'yunzheng'
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[params]
  author = '芸峥 (Zhenyun Sun)'
  description = '芸峥的个人博客 — 分享技术学习经验与生活记录'
  mainSite = 'https://yunzheng.space'
  keywords = '芸峥, Zhenyun Sun, 博客, BGP, AS204921, 网络工程, Linux, Homelab, 业余无线电, BI1UHI, FadianRoam, eduroam'
  ogImage = 'https://yunzheng.space/yunzheng.space.png'

[markup]
  [markup.highlight]
    style = 'monokailight'
    lineNos = false
    noClasses = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ['HTML', 'RSS']

[sitemap]
  changeFreq = 'weekly'
  priority = 0.5
  filename = 'sitemap.xml'

[menu]
  [[menu.main]]
    name = '首页'
    url = '/'
    weight = 1
  [[menu.main]]
    name = '归档'
    url = '/archives/'
    weight = 2
  [[menu.main]]
    name = '关于'
    url = 'https://yunzheng.space/index.zh.html'
    weight = 3
